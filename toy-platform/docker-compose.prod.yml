version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: toy-platform-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://toy_user:${DB_PASSWORD}@db:5432/toy_platform
      - NEXTAUTH_URL=https://toyplatform.uz
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=ap-south-1
      - S3_BUCKET_NAME=toy-platform-images
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - toy-network
    volumes:
      - app-logs:/var/log/toy-platform
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  db:
    image: postgres:16-alpine
    container_name: toy-platform-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=toy_user
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=toy_platform
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8 --lc-collate=C --lc-ctype=C
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - toy-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U toy_user -d toy_platform"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: toy-platform-redis
    restart: unless-stopped
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - toy-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:alpine
    container_name: toy-platform-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/ssl:/etc/letsencrypt:ro
      - ./deploy/ssl/www:/var/www/certbot:ro
    depends_on:
      - app
    networks:
      - toy-network

volumes:
  postgres_data:
  redis_data:
  app-logs:

networks:
  toy-network:
    driver: bridge
